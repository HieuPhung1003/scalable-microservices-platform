paths:
  - path: /auth
    pathType: Prefix
    backend:
      service:
        name: auth-service
        port:
          number: 8080

  - path: /api
    pathType: Prefix
    backend:
      service:
        name: user-service
        port:
          number: 8080

  - path: /
    pathType: Prefix
    backend:
      service:
        name: frontend-service
        port:
          number: 80