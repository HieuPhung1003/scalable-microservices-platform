apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: microservices-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 919664459382.dkr.ecr.ap-southeast-1.amazonaws.com/do2509-hieuphung-mockprj/micro-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000